name: Deploy to Google Cloud

on:
  # Temporarily disabled - uncomment push trigger to re-enable
  # push:
  #   paths-ignore:
  #     - 'terraform/aws/**'
  #     - 'terraform/azure/**'
  #     - 'terraform/cloudflare/**'
  #     - '*.md'
  #     - '.gitignore'
  #     - '.vscode/**'
  #     - '.github/workflows/gh-deploy.yml'
  #     - '.github/workflows/aws-deploy.yml'
  #     - '.github/workflows/azure-deploy.yml'
  #     - '.github/workflows/cloudflare-deploy.yml'
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  TERRAFORM_VERSION: 1.6.0

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: gcp
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Initialize Terraform
        working-directory: ./terraform/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=portfolio/gcp"

      - name: Terraform format
        working-directory: ./terraform/gcp
        run: terraform fmt -check

      - name: Terraform Plan
        working-directory: ./terraform/gcp
        id: tf-plan
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="gcp_region=${{ env.GCP_REGION }}" \
            -var="domain=${{ vars.GCP_DOMAIN }}" \
            -var="service_account_email=${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}" \
            || export exitcode=$?

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ $exitcode -eq 1 ]; then
            echo Terraform Plan Failed!
            exit 1
          else
            exit 0
          fi

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-gcp
          path: terraform/gcp/tfplan

  build-site:
    name: Build Astro Site
    runs-on: ubuntu-latest
    environment: gcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, build-site]
    if: needs.terraform-plan.outputs.tfplanExitCode == 2
    environment: gcp
    outputs:
      storageBucketName: ${{ steps.tf-outputs.outputs.storage_bucket }}
      loadBalancerIp: ${{ steps.tf-outputs.outputs.load_balancer_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Initialize Terraform
        working-directory: ./terraform/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=portfolio/gcp"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-gcp
          path: terraform/gcp/

      - name: Terraform Apply
        working-directory: ./terraform/gcp
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        working-directory: ./terraform/gcp
        id: tf-outputs
        run: |
          STORAGE_BUCKET=$(terraform output -raw storage_bucket_name)
          LOAD_BALANCER_IP=$(terraform output -raw load_balancer_ip)

          echo "storage_bucket=$STORAGE_BUCKET" >> $GITHUB_OUTPUT
          echo "load_balancer_ip=$LOAD_BALANCER_IP" >> $GITHUB_OUTPUT

  deploy-to-gcs:
    name: Deploy to Cloud Storage
    runs-on: ubuntu-latest
    environment: gcp
    needs: [terraform-plan, build-site, terraform-apply]
    if: always() && needs.build-site.result == 'success' && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: ./terraform/gcp
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=portfolio/gcp"

      - name: Get infrastructure info
        id: infra
        working-directory: ./terraform/gcp
        run: |
          STORAGE_BUCKET=$(terraform output -raw storage_bucket_name 2>/dev/null || echo "")

          echo "storage_bucket=$STORAGE_BUCKET" >> $GITHUB_OUTPUT

      - name: Upload files to Cloud Storage
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000" rsync -r -d \
            -x ".*\.html$|.*\.xml$|.*\.txt$" \
            dist/ gs://${{ steps.infra.outputs.storage_bucket }}/

          # Upload HTML files with shorter cache
          gsutil -m -h "Cache-Control:public, max-age=3600" rsync -r -d \
            -x "^(?!.*\.html$|.*\.xml$|.*\.txt$).*$" \
            dist/ gs://${{ steps.infra.outputs.storage_bucket }}/

      - name: Deployment summary
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "📦 Files uploaded to Cloud Storage: ${{ steps.infra.outputs.storage_bucket }}"
          echo "🌍 Load Balancer IP: ${{ needs.terraform-apply.outputs.loadBalancerIp }}"
          echo "📝 Point your DNS record to: ${{ needs.terraform-apply.outputs.loadBalancerIp }}"
