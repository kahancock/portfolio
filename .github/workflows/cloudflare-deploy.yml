name: Deploy to Cloudflare Pages

on:
  push:
    paths-ignore:
      - "terraform/aws/**"
      - "terraform/azure/**"
      - "terraform/gcp/**"
      - "*.md"
      - ".gitignore"
      - ".vscode/**"
      - ".github/workflows/gh-deploy.yml"
      - ".github/workflows/aws-deploy.yml"
      - ".github/workflows/azure-deploy.yml"
      - ".github/workflows/gcp-deploy.yml"
  workflow_dispatch:

env:
  TERRAFORM_VERSION: 1.6.0

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: ./terraform/cloudflare
        run: |
          cat > r2.tfbackend <<EOF
          bucket = "${{ vars.CF_TF_STATE_BUCKET }}"
          key    = "portfolio/terraform.tfstate"
          endpoints = {
            s3 = "https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          EOF
          terraform init -backend-config=r2.tfbackend

      - name: Terraform format
        working-directory: ./terraform/cloudflare
        run: terraform fmt -check

      - name: Terraform Plan
        working-directory: ./terraform/cloudflare
        id: tf-plan
        run: |
          export exitcode=0
          terraform plan -detailed-exitcode -no-color -out tfplan \
            -var="cloudflare_account_id=${{ vars.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="custom_domain=${{ vars.CF_CUSTOM_DOMAIN }}" \
            || export exitcode=$?

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ $exitcode -eq 1 ]; then
            echo Terraform Plan Failed!
            exit 1
          else
            exit 0
          fi

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-cloudflare
          path: terraform/cloudflare/tfplan

  build-site:
    name: Build Astro Site
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, build-site]
    if: needs.terraform-plan.outputs.tfplanExitCode == 2
    environment: cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
    outputs:
      pagesProjectName: ${{ steps.tf-outputs.outputs.pages_project_name }}
      siteUrl: ${{ steps.tf-outputs.outputs.site_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-cloudflare
          path: terraform/cloudflare/

      - name: Initialize Terraform
        working-directory: ./terraform/cloudflare
        run: |
          cat > r2.tfbackend <<EOF
          bucket = "${{ vars.CF_TF_STATE_BUCKET }}"
          key    = "portfolio/terraform.tfstate"
          endpoints = {
            s3 = "https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          EOF
          terraform init -backend-config=r2.tfbackend

      - name: Terraform Apply
        working-directory: ./terraform/cloudflare
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        working-directory: ./terraform/cloudflare
        id: tf-outputs
        run: |
          PAGES_PROJECT_NAME=$(terraform output -raw pages_project_name)
          SITE_URL=$(terraform output -raw site_url)

          echo "pages_project_name=$PAGES_PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

  deploy-to-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: cloudflare
    needs: [terraform-plan, build-site, terraform-apply]
    if: always() && needs.build-site.result == 'success' && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: ./terraform/cloudflare
        run: |
          cat > r2.tfbackend <<EOF
          bucket = "${{ vars.CF_TF_STATE_BUCKET }}"
          key    = "portfolio/terraform.tfstate"
          endpoints = {
            s3 = "https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          EOF
          terraform init -backend-config=r2.tfbackend

      - name: Get infrastructure info
        id: infra
        working-directory: ./terraform/cloudflare
        run: |
          PAGES_PROJECT_NAME=$(terraform output -raw pages_project_name 2>/dev/null || echo "")

          echo "pages_project_name=$PAGES_PROJECT_NAME" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=${{ steps.infra.outputs.pages_project_name }} --branch=main

      - name: Deployment summary
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "📦 Pages project: ${{ steps.infra.outputs.pages_project_name }}"
          echo "🌍 URL: https://${{ vars.CF_CUSTOM_DOMAIN }}"
